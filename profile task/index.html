<!DOCTYPE html>
<html>
<head>
<title>Profile Card</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

    <div class="top-section">
        <img src="https://img.freepik.com/premium-vector/avatar-profile-icon-flat-style-female-user-profile-vector-illustration-isolated-background-women-profile-sign-business-concept_157943-38866.jpg?semt=ais_rp_50_assets&w=740&q=80" class="profile-img">
    </div>

    <div class="info">
        <h2>Mifrah Iqbal</h2>
        <p class="location">Karachi, Pakistan</p>
        <p class="job">Front End Developer</p>

        <div class="buttons">
            <button>Message</button>
            <button>Follow</button>
        </div>
    </div>

    <hr>

    <div class="skills">
        <h3>Skills</h3>
        <p>HTML</p>
        <p>CSS</p>
        <p>JavaScript</p>
        <p>React</p>
    </div>

</div>

</body>
</html>
